    items:
      - Tongs
  - heading: Baked
    items:
      - Baking Sheet
      - Wire Rack

instructions:
  - heading: Marinating the Chicken
    type: sequence
    steps:
      - text: Measure out all spices and add them to your mixing bowl
      - text: Stir the spices together with a spoon or whisk until evenly combined
      - text: Add half the buttermilk and all the lemon juice, stir to combine
      - text: Add chicken thighs and mix to coat
      - text: Add enough remaining buttermilk to fully cover the chicken and mix again
      - text: Cover and refrigerate for 8 to 72 hours
        notes:
          - The longer you marinate, the better the flavor.
          - The more past the expiration date your buttermilk is, the tangier it will taste. As long as it stays cold and no other cultures are introduced, buttermilk can remain safe to cook with well past its printed date.
          - Do not use buttermilk that is moldy, off-color, or no longer resembles buttermilk.

  - heading: Grilled
    type: branch
    branch_group: cooking-method
    steps:
      - text: Preheat grill to 218°C (425°F) and ensure grates are fully heated
      - text: Place chicken skin side down and cook for 8 minutes
      - text: Flip and cook for another 8 minutes
      - text: Check internal temperature — chicken must reach 74°C (165°F). If not, cook in 3-minute increments and check again until it does.

  - heading: Baked
    type: branch
    branch_group: cooking-method
    steps:
      - text: Preheat oven to 218°C (425°F)
      - text: Place chicken skin side down on a wire rack over a baking sheet and bake for 8 minutes
      - text: Flip and bake for another 8 minutes
      - text: Check internal temperature — chicken must reach 74°C (165°F). If not, bake in 3-minute increments and check again until it does.

  - heading: Serving
    type: sequence
    steps:
      - text: Let chicken rest for 8 minutes before slicing
        notes:
          - Resting allows the juices to redistribute and stay in the meat when cut.
      - text: Slice into roughly 2cm (3/4 inch) cubes and serve

  - heading: Freezing
    type: sequence
    optional: true
    steps:
      - text: Flash freeze individual cubes on a baking sheet, ensuring pieces do not touch
      - text: Freeze for approximately 3 hours or until pieces no longer stick together
      - text: Transfer to a sealed freezer bag or vacuum-sealed bag
        notes:
          - Stores up to 3 months in a standard freezer bag; longer in a vacuum-sealed bag.
