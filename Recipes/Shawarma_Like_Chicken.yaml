name: Shawarma Like Chicken
version: "1.3"
author: Jonathan Petz | JPEGtheDev
description: >
  While not real chicken shawarma, it comes close to the real deal and is practical
  when serving a large number of people. Marinated in a spiced buttermilk brine
  and cooked on the grill or in the oven.
status: stable

