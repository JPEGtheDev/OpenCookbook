name: Kebab Meat
version: "1.5"
author: Jonathan Petz | JPEGtheDev
description: >
  A general purpose recipe for beef kebab meat. This is a variation for simplicity's
  sake but the overall flavor is the same. Texture wise it is completely different
  from traditional kebab.
status: stable

yields:
  quantity: 8
  unit: serving

ingredients:
  - heading: null
    items:
      - quantity: 907
        unit: g
        name: 88/12 Ground Beef
        note: "88/12 is the recommended blend"
        nutrition_id: "2724c62f-1832-5ccf-97b0-d219812368d8"
        alternates:
          - name: 80/20 Ground Beef
            nutrition_id: "ca7b2dfc-90a9-57e5-995d-605dfef2baf8"
            note: "For a balanced result"
          - name: 70/30 Ground Beef
            nutrition_id: "16611239-ee90-45aa-986f-7afb3b4dc897"
            note: "For a richer, more indulgent result"
      - quantity: 7
        unit: g
        name: Paprika
        volume_alt: "1 tbsp."
        nutrition_id: "ffc59cf3-4d62-5b01-b14d-820ca9c88098"
      - quantity: 9
        unit: g
        name: Sumac
        volume_alt: "1 tbsp."
        nutrition_id: "77b96513-2170-5f21-a7fb-16fd094b16be"
      - quantity: 1.6
        unit: g
        name: Garlic Powder
        volume_alt: "1/2 tsp."
        nutrition_id: "6fd97682-cd9c-54a6-a8a9-94273d4f6137"
      - quantity: 0.6
        unit: g
        name: Black Pepper
        volume_alt: "1/4 tsp."
        nutrition_id: "de21ba84-93f9-53e7-b961-aa1f6f04fe58"
      - quantity: 1
        unit: g
        name: Red Pepper Flakes
        volume_alt: "1/2 tsp."
        nutrition_id: "17a51f74-e34e-5526-907b-a5438ac9163b"
      - quantity: 0.5
        unit: g
        name: Caraway Seed Powder
        volume_alt: "1/4 tsp."
        nutrition_id: "5f93c38f-94bf-5663-b13c-bd53518b1273"
      - quantity: 9
        unit: g
        name: Fine Sea Salt
        volume_alt: "1 1/2 tsp."
        nutrition_id: "5c00ccf3-0bd6-5da0-8f97-a107d381609b"
      - quantity: 1.2
        unit: g
        name: Cayenne Pepper
        volume_alt: "1/2 tsp."
        nutrition_id: "90032c80-ba60-5844-b724-913bc7d45601"
      - quantity: 110
        unit: g
        name: Yellow Onion
        note: "approximately 1 medium yellow onion"
        nutrition_id: "62a41ce3-b227-4a59-a51f-d7e9e64388bb"

utensils:
  - heading: null
    items:
      - Cheese Grater
      - Mixing Bowl

instructions:
  - heading: null
    type: sequence
    steps:
      - text: Grate onion using a cheese grater into a bowl
      - text: Squeeze out as much juice as possible using a cheesecloth, clean tea towel, or your hands
        notes:
          - The onion juice can be reserved and used in a sauce.
      - text: Combine all ingredients in your mixing bowl and mix by hand until the mixture resembles a paste
        notes:
          - A stand mixer with a paddle attachment works very well and gives the mixture a more kebab-like texture.
          - For a traditional kebab consistency, blend the mixture in a food processor or meat grinder until you have a meat paste. Skip this step if you just want the flavor without skewering.
          - If prepping ahead, leave the salt out until approximately 30 minutes before cooking. Adding salt too early significantly increases meat density, which may or may not be desirable depending on your preparation method.

related:
