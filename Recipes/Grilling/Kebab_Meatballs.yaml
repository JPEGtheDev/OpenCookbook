name: Kebab Meatballs
version: "1.3"
author: Jonathan Petz | JPEGtheDev
description: >
  A continuation of the Kebab Meat recipe. Forms the kebab mixture into meatballs
  that can be made in bulk to eat now or freeze for later.
status: stable

ingredients:
  - heading: null
    items:
      - quantity: 907
        unit: g
        name: 88/12 Ground Beef (or 1× Kebab Meat Recipe)
      - quantity: 40
        unit: g
        name: Panko Bread Crumbs

utensils:
  - heading: null
    items:
      - Mixing Bowl
      - Baking Sheet
      - Grill

instructions:
  - heading: null
    type: sequence
    steps:
      - text: Mix breadcrumbs into kebab meat by hand, or add them to the stand mixer if the meat is still in it from the previous recipe
      - text: Using a cookie scoop or by hand, form into 24 equal-sized meatballs of approximately 45 g each (±2.5 g)

  - heading: Oven
    type: branch
    branch_group: cooking-method
    steps:
      - text: Preheat oven to 204°C (400°F)
      - text: Space meatballs evenly on a bare baking sheet — no lining needed
      - text: Bake for 18–20 minutes, or until the internal temperature reaches at least 71°C (160°F)
        notes:
          - 71°C (160°F) is the minimum safe internal temperature for ground beef.
          - For well done, cook to 77°C (170°F).

  - heading: Grilled
    type: branch
    branch_group: cooking-method
    steps:
      - text: Preheat grill to 232°C (450°F)
      - text: Place meatballs on the grill grates, spacing them so they are not touching
      - text: Grill for 15 minutes, or until the internal temperature reaches at least 71°C (160°F)
        notes:
          - 71°C (160°F) is the minimum safe internal temperature for ground beef.
          - For grate marks on both sides, flip the meatballs once halfway through cooking.

  - heading: Freezing
    type: sequence
    optional: true
    steps:
      - text: Allow meatballs to cool fully after cooking
      - text: Place uncovered on a baking tray in the freezer, ensuring pieces are not touching
      - text: Freeze until pieces no longer stick together (approximately 1–2 hours)
      - text: Transfer to a sealed plastic freezer bag or vacuum-sealed bag
        notes:
          - Stores for up to 3 months without losing flavor.

related:
  - label: Kebab Meat Recipe
    path: ./Kebab_Meat.yaml
