      - quantity: 300
        unit: g
        name: Brown Sugar
        nutrition_id: "6a128e75-ada9-53e5-b4f0-6f101aa16dc9"
      - quantity: 20
        unit: g
        name: Garlic Powder
        nutrition_id: "6fd97682-cd9c-54a6-a8a9-94273d4f6137"
      - quantity: 35
        unit: g
        name: Onion Powder
        nutrition_id: "5fd3cc2d-5d2a-56c1-90de-d30638cf3a45"
      - quantity: 100
        unit: g
