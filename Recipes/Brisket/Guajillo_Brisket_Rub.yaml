name: Guajillo Brisket Rub
version: "1.1"
author: Jonathan Petz | JPEGtheDev
description: >
  A proven brisket rub that is a bit spicy and sweet. While it isn't a traditional
  brisket rub, it is amazing.
status: stable
tags:
  - beef
  - brisket
  - bbq
  - smoked
  - rub

yields:
  quantity: 960
  unit: g

ingredients:
  - heading: null
    items:
      - quantity: 100
        unit: g
        name: Guajillo Chiles
        nutrition_id: "de2f4f3c-e40c-5c1c-a862-fdb070804391"
      - quantity: 50
        unit: g
        name: Pasilla Chiles
        nutrition_id: "fa672744-7a09-56f7-9ff6-99cca4fedfd7"
      - quantity: 300
        unit: g
