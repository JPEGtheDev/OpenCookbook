utensils:
  - heading: null
    items:
      - Bowl large enough to fit your ingredients
      - Blender or Food Processor

instructions:
  - heading: null
    type: sequence
    steps:
      - text: Remove the stems from the chiles by hand
      - text: Add the chiles to a blender or food processor and grind until a fine powder
        notes:
          - If you do not have pre-ground mustard seed powder, grind the mustard seeds at this step as well.
      - text: Add all remaining ingredients to a large bowl and combine using your hands or a large spoon until evenly mixed

