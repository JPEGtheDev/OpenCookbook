utensils:
  - heading: null
    items:
      - Large Pan or Saucepan
      - Wooden Spoon or Spatula
      - Blender (optional, for smooth sauce)
      - Knife for mincing

instructions:
  - heading: null
    type: sequence
    steps:
      - text: "Melt butter in a large pan over medium heat"
      - text: "Add minced onion and salt, sauté until softened (approximately 3–4 minutes)"
      - text: "Add minced garlic and cook for approximately 1 minute, stirring frequently"
        notes:
          - "Do not allow garlic to brown"
      - text: "Add crushed tomatoes, stir well to combine"
      - text: "Increase heat to medium-high and cook for approximately 5 minutes, stirring every 30 seconds"
      - text: "Add vodka, stir to combine"
      - text: "Reduce heat to low and simmer for 15 minutes, stirring every few minutes"
        notes:
          - "The sauce will thicken slightly and flavors will meld"
          - "Alcohol will cook off during simmering"

  - heading: Smooth Sauce
    type: branch
    branch_group: texture
    steps:
      - text: "Transfer sauce to a blender"
      - text: "Blend on high speed until completely smooth"
      - text: "Return to pan if additional cooking or warming is needed"

  - heading: Rustic Sauce
    type: branch
    branch_group: texture
    steps:
      - text: "Serve sauce as-is without blending for a chunkier, more rustic texture"

  - heading: Serving with Spaghetti
    type: sequence
    optional: true
    steps:
      - text: "Bring a large pot of salted water to a boil (salt until it tastes like seawater)"
      - text: "Add 454g of spaghetti and cook according to package instructions until al dente"
        notes:
          - "Italian brands typically indicate al dente cooking time"
          - "Test at the lower end of the suggested range"
      - text: "Transfer hot spaghetti directly to the sauce using tongs (do not drain the pasta water)"
      - text: "Add approximately 240 ml of pasta water to the sauce and combine"
        notes:
          - "The starchy water helps emulsify the sauce and coat the pasta"
          - "Add additional pasta water as needed to achieve desired sauce consistency"
      - text: "Using a medium ladle (~180 ml) and tongs, twirl a portion of spaghetti into a nest"
      - text: "Plate the twirled spaghetti, holding the ladle underneath to catch sauce"
      - text: "Pour sauce over the top and serve immediately"

  - heading: Storage
    type: storage
    optional: true
    steps:
      - text: "Allow sauce to cool to room temperature"
      - text: "Store in an airtight container in the refrigerator"
        notes:
          - "Stores for up to 5 days"
      - text: "To freeze, transfer to a freezer bag or container"
        notes:
          - "Stores frozen for up to 3 months"
          - "Thaw in refrigerator before reheating"

notes:
  - "This recipe yields approximately 1000g of sauce, designed to pair with 454g of spaghetti"
  - "Branching paths for texture (smooth vs rustic) are optional — choose the style you prefer"
  - "See PASTA_COOKING.md reference guide for general pasta cooking techniques and al dente standards"
