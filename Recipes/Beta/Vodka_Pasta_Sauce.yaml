name: Vodka Pasta Sauce
version: "1.0"
author: Jonathan Petz | JPEGtheDev
description: >
  A classic red sauce featuring tomatoes, garlic, and a splash of vodka to bring
  out the depth of flavor. This recipe yields enough sauce to pair with 454g of
  spaghetti. Choose between a smooth blended sauce or rustic texture to your preference.
status: beta
tags:
  - pasta
  - sauce
  - italian
  - vegetarian
  - red sauce

yields:
  quantity: 4
  unit: serving

serving_size:
  quantity: 250
  unit: g

