name: Lemon Butter Sauce
version: "1.0"
author: Jonathan Petz | JPEGtheDev
description: >
  A classic French-style butter sauce with caramelized onions, garlic, and
  white wine. Perfect for pasta, seafood, or as a finishing sauce. Freezes
  beautifully in cubes for convenient portioning.
status: beta

