instructions:
  - heading: null
    type: sequence
    steps:
      - text: Melt the unsalted butter in a large skillet or saucepan over medium heat.
      - text: Grate the yellow onion finely and add to the melted butter along with the salt.
      - text: Reduce heat to low and sauté slowly, stirring occasionally, for 8–10 minutes until the onions begin to brown at the edges.
      - text: Mince the garlic cloves finely and add to the pan when the onions start to brown.
      - text: Cook for 2 minutes, stirring frequently to prevent burning.
      - text: Pour in the dry white wine and increase heat to medium to bring to a simmer.
      - text: Reduce the wine by half, approximately 3–5 minutes, until the liquid is noticeably thickened.
      - text: Once the wine has reduced, remove from heat and squeeze the juice from the lemon half into the pan.
      - text: Chop the fresh parsley finely and add to the sauce, stirring to combine.
      - text: Use immediately in a pasta dish or allow to cool and store.

  - heading: Storage
    type: sequence
    section_type: storage
    optional: true
    steps:
      - text: Allow the sauce to cool to room temperature.
      - text: Pour into ice cube trays or small freezer containers for portioning.
      - text: Freeze for up to 3 months.
      - text: Thaw and reheat gently before using.

notes:
  - "Final yield weight needs to be measured. Start with this recipe and weigh the finished sauce to establish the total quantity."
  - "Salt amount can be adjusted to taste before freezing or after reheating."
  - "For a lighter sauce, use more wine or less butter. For richness, use more butter."
