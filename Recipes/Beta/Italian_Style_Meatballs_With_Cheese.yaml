utensils:
  - heading: null
    items:
      - Mixing Bowl
      - Baking Sheet
      - Pan or Skillet

instructions:
  - heading: null
    type: sequence
    steps:
      - text: "Combine all ingredients in a mixing bowl"
      - text: "Mix by hand until the mixture is well combined and paste-like"
        notes:
          - "Do not overmix or the meatballs will become dense"
          - "The mixture should hold together easily"
      - text: "Using a cookie scoop or by hand, form into 12 equal-sized meatballs of approximately 50 g each (±2.5 g)"
        notes:
          - "Wetting your hands slightly makes shaping easier"
          - "Target range: 47.5–52.5 g per meatball"
      - text: "Space meatballs evenly on a baking sheet or work surface for cooking"

  - heading: Pan-Fried
    type: branch
    branch_group: cooking-method
    steps:
      - text: "Heat a skillet over medium-high heat and add oil to prevent sticking"
      - text: "Place meatballs in the pan without crowding — work in batches if necessary"
      - text: "Cook for approximately 8–10 minutes"
      - text: "Flip the meatballs halfway through cooking to ensure even browning on both sides"
      - text: "Meatballs are done when the internal temperature reaches at least 71°C (160°F)"
        notes:
          - "71°C (160°F) is the minimum safe internal temperature for ground beef"
          - "For well-done, cook to 77°C (170°F)"

  - heading: Oven
    type: branch
    branch_group: cooking-method
    steps:
      - text: "Preheat oven to 204°C (400°F)"
      - text: "Space meatballs evenly on a bare baking sheet"
      - text: "Bake for 18–20 minutes, or until the internal temperature reaches at least 71°C (160°F)"
        notes:
          - "71°C (160°F) is the minimum safe internal temperature for ground beef"
          - "For well-done, cook to 77°C (170°F)"
          - "These instructions are untested for this recipe — use as a starting point"

  - heading: Grilled
    type: branch
    branch_group: cooking-method
    steps:
      - text: "Preheat grill to 232°C (450°F)"
      - text: "Place meatballs on the grill grates, spacing them so they are not touching"
      - text: "Grill for approximately 12–15 minutes, or until the internal temperature reaches at least 71°C (160°F)"
        notes:
          - "71°C (160°F) is the minimum safe internal temperature for ground beef"
          - "For well-done, cook to 77°C (170°F)"
          - "For grate marks on both sides, flip the meatballs once halfway through cooking"
          - "These instructions are untested for this recipe — use as a starting point"

  - heading: Freezing
    type: storage
    optional: true
    steps:
      - text: "Allow meatballs to cool fully after cooking"
      - text: "Place uncovered on a baking sheet in the freezer, ensuring pieces are not touching"
      - text: "Freeze until pieces no longer stick together (approximately 1–2 hours)"
      - text: "Transfer to a sealed plastic freezer bag or vacuum-sealed bag"
        notes:
          - "Stores for up to 3 months without losing flavor"

  - heading: Refrigerator Storage
    type: storage
    optional: true
    steps:
      - text: "Allow meatballs to cool fully"
      - text: "Store in an airtight container in the refrigerator"
        notes:
          - "Stores for up to 4 days"

notes:
  - "Oven and grilled cooking methods borrowed from Kebab Meatballs recipe — untested for this specific blend"
  - "Recipe yields 605g total, divided into 12 meatballs at ~50g each (±2.5g)"
  - "Scaled from test batch using 2% lowfat cottage cheese"
