  - heading: null
    items:
      - quantity: 454
        unit: g
        name: 88/12 Ground Beef
        nutrition_id: "2724c62f-1832-5ccf-97b0-d219812368d8"
        note: "88/12 is the recommended blend for this recipe"
        alternates:
