name: Italian Style Meatballs with Cheese
version: "1.0"
author: Jonathan Petz | JPEGtheDev
description: >
  Tender Italian meatballs blended with cottage cheese for richness and binding.
  These 12 meatballs are oven, grill, or pan-fried friendly, and freeze well for
  longer storage.
status: beta
tags:
  - beef
  - italian
  - meatballs
  - cheese
  - freezer ready

yields:
  quantity: 12
  unit: meatball

serving_size:
  quantity: 3
  unit: meatball

