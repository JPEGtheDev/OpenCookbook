name: Deploy PR Preview

on:
  workflow_run:
    workflows: ["Build PR"]
    types: [completed]
  pull_request_target:
    types: [closed]
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  actions: read

concurrency:
  group: pr-preview
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download PR metadata
        uses: actions/download-artifact@v4
        with:
          name: pr-metadata
          path: pr-metadata
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read PR metadata
        id: pr
        run: |
          echo "number=$(cat pr-metadata/number)" >> "$GITHUB_OUTPUT"
          echo "sha=$(cat pr-metadata/sha)" >> "$GITHUB_OUTPUT"

      - name: Download preview site
        uses: actions/download-artifact@v4
        with:
          name: pr-preview-site
          path: preview-site
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: preview-site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Post or update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const previewUrl = '${{ steps.deploy.outputs.page_url }}';
            const sha = '${{ steps.pr.outputs.sha }}'.substring(0, 7);

            const body = [
              '## 🚀 PR Preview Deployed',
              '',
              '| Detail | Value |',
              '|--------|-------|',
              `| **Preview URL** | ${previewUrl} |`,
              `| **Commit** | \`${sha}\` |`,
              `| **PR** | #${prNumber} |`,
              '',
              '> This preview reflects the latest changes in this PR.',
              '> The production site will be restored when this PR is merged or on the next push to `master`.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const marker = '## 🚀 PR Preview Deployed';
            const existing = comments.find(c =>
              c.body.includes(marker) && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  cleanup:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const merged = context.payload.pull_request.merged;
            const action = merged ? 'merged' : 'closed';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const marker = '## 🚀 PR Preview Deployed';
            const existing = comments.find(c =>
              c.body.includes(marker) && c.user.type === 'Bot'
            );

            const body = [
              '## 🏁 PR Preview Removed',
              '',
              `This preview has been removed because the PR was **${action}**.`,
              '',
              merged
                ? '> The production site will be updated automatically by the deploy workflow.'
                : '> The production site will be restored on the next push to `master`.',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
