name: PR Preview Cleanup

on:
  pull_request_target:
    types: [closed]
    branches: [master]

permissions:
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const merged = context.payload.pull_request.merged;
            const action = merged ? 'merged' : 'closed';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const marker = '## � PR Preview Built';
            const existing = comments.find(c =>
              c.body.includes(marker) && c.user.type === 'Bot'
            );

            const body = [
              '## 🏁 PR Preview Artifact Expired',
              '',
              `This PR was **${action}**. The preview artifact is no longer available.`,
              '',
              merged
                ? '> The production site will be updated automatically by the deploy workflow.'
                : '> No further action needed.',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
