name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        working-directory: visualizer
        run: dotnet restore

      - name: Calculate version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # If HEAD is already tagged (workflow re-run), use it as-is
          EXISTING=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ -n "$EXISTING" ]; then
            echo "HEAD already tagged: $EXISTING"
            echo "VERSION=${EXISTING#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find the last strict semver tag (vX.Y.Z only — no pre-release suffixes)
          LAST_TAG=$(git tag --list | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ -z "$LAST_TAG" ]; then
            LAST_VERSION="0.0.0"
            COMMITS=$(git log --pretty=format:"%s%n%b" HEAD)
          else
            LAST_VERSION="${LAST_TAG#v}"
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s%n%b")
          fi

          # If no new commits since last tag, emit existing version without re-tagging
          if [ -z "$(echo "$COMMITS" | tr -d '[:space:]')" ]; then
            echo "No commits since $LAST_TAG"
            echo "VERSION=$LAST_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Parse current version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"

          # Determine bump from conventional commits:
          #   MAJOR — any commit with '!' suffix or a 'BREAKING CHANGE:' footer
          #   MINOR — any 'feat:' or 'feat(<scope>):' commit
          #   PATCH — everything else (fix, chore, docs, refactor, …)
          if echo "$COMMITS" | grep -qE '^[a-z]+(\([^)]+\))?!:' || \
             echo "$COMMITS" | grep -qE '(^|[[:space:]])BREAKING CHANGE:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\([^)]+\))?:'; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP | $LAST_VERSION → $NEW_VERSION"
          echo "VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        working-directory: visualizer
        run: dotnet test --no-restore --verbosity normal

      - name: Push version tag
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Skip if HEAD is already tagged (re-run of a previously tagged commit)
          if git tag --points-at HEAD | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "HEAD already tagged, skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}" || {
            REMOTE_SHA=$(git ls-remote --tags origin "refs/tags/v${VERSION}" | awk '{print $1}')
            if [ -n "$REMOTE_SHA" ]; then
              echo "Tag v${VERSION} already exists on remote, proceeding"
            else
              echo "ERROR: Failed to push tag v${VERSION}" >&2
              exit 1
            fi
          }

      - name: Publish Blazor WASM app
        working-directory: visualizer
        run: dotnet publish src/OpenCookbook.Web/OpenCookbook.Web.csproj -c Release -o output -p:Version="${{ steps.version.outputs.VERSION }}"

      - name: Copy recipes to output
        run: |
          mkdir -p visualizer/output/wwwroot/recipes
          find Recipes -name "*.yaml" | while read -r file; do
            relpath="${file#Recipes/}"
            dir=$(dirname "$relpath")
            if [ "$dir" != "." ]; then
              mkdir -p "visualizer/output/wwwroot/recipes/$dir"
            fi
            cp "$file" "visualizer/output/wwwroot/recipes/$relpath"
          done

      - name: Generate recipe index
        run: |
          pip install pyyaml==6.0.2 --quiet
          python3 -c "
          import json, yaml, os, glob

          recipes_dir = 'visualizer/output/wwwroot/recipes'
          entries = []
          for filepath in sorted(glob.glob(os.path.join(recipes_dir, '**/*.yaml'), recursive=True)):
              with open(filepath) as f:
                  data = yaml.safe_load(f)
              rel_path = os.path.relpath(filepath, recipes_dir)
              entries.append({
                  'name': data.get('name', ''),
                  'path': rel_path,
                  'status': data.get('status', ''),
                  'description': (data.get('description', '') or '').strip()
              })
          with open(os.path.join(recipes_dir, 'recipe-index.json'), 'w') as f:
              json.dump(entries, f, indent=2)
          "

      - name: Add .nojekyll and 404.html
        run: |
          touch visualizer/output/wwwroot/.nojekyll
          cp visualizer/output/wwwroot/index.html visualizer/output/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: visualizer/output/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ github.event.repository.html_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
