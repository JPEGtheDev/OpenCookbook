name: Build PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        working-directory: visualizer
        run: dotnet restore

      - name: Build
        working-directory: visualizer
        run: dotnet build --no-restore

      - name: Test
        working-directory: visualizer
        run: dotnet test --no-restore --verbosity normal

      - name: Publish Blazor WASM app
        working-directory: visualizer
        run: dotnet publish src/OpenCookbook.Web/OpenCookbook.Web.csproj -c Release -o output

      - name: Copy recipes to output
        run: ./scripts/copy-recipes.sh visualizer/output/wwwroot

      - name: Generate recipe index
        run: |
          pip install pyyaml==6.0.2 --quiet
          python3 scripts/generate-recipe-index.py visualizer/output/wwwroot/recipes

      - name: Add .nojekyll and 404.html
        run: ./scripts/prepare-spa.sh visualizer/output/wwwroot

      - name: Patch base href for local serving
        run: |
          sed -i 's|<base href="/OpenCookbook/" />|<base href="/" />|g' \
            visualizer/output/wwwroot/index.html \
            visualizer/output/wwwroot/404.html

      - name: Generate recipe share pages
        run: |
          python3 scripts/generate-recipe-pages.py \
            visualizer/output/wwwroot/recipes \
            visualizer/output/wwwroot \
            "http://localhost:8000"

      - name: Bundle local preview server
        run: cp scripts/serve.py visualizer/output/wwwroot/serve.py

      - name: Upload preview artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-site
          path: visualizer/output/wwwroot

      - name: Post preview download instructions
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const sha = process.env.PR_SHA.substring(0, 7);
            const runId = process.env.RUN_ID;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const ghCmd = [
              `gh run download ${runId} --repo ${owner}/${repo} -n pr-preview-site -D pr-preview-site`,
              `cd pr-preview-site && python3 serve.py`,
            ].join('\n');

            const body = [
              '## 📦 PR Preview Built',
              '',
              `**Commit:** \`${sha}\` | **PR:** #${prNumber}`,
              '',
              'Download and run locally:',
              '',
              '```bash',
              ghCmd,
              '```',
              '',
              '> Opens at `http://localhost:8000`. Pass a port as argument if needed: `python3 serve.py 9000`',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const marker = '## 📦 PR Preview Built';
            const existing = comments.find(c =>
              c.body.includes(marker) && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
