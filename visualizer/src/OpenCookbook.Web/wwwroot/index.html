<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>OpenCookbook</title>
    <base href="/OpenCookbook/" />
    <link rel="stylesheet" href="css/app.css" />
    <script>
        // Apply OS colour-scheme immediately to avoid a flash of wrong theme.
        // No cookies or localStorage — resets to OS preference on every page load.
        (function () {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
        })();
    </script>
</head>

<body>
    <div id="app">
        <div class="loading-splash">
            <svg class="loading-progress">
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
            <div class="loading-progress-text"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <!-- __CACHE_BUST__ is replaced with the app version during CI/CD deployment -->
    <script src="_framework/blazor.webassembly.js?v=__CACHE_BUST__" autostart="false"></script>
    <script>
        // Theme interop — called from Blazor via IJSRuntime
        window.themeInterop = {
            getTheme: function () {
                return document.documentElement.getAttribute('data-theme') || 'light';
            },
            setTheme: function (theme) {
                document.documentElement.setAttribute('data-theme', theme);
            }
        };

        Blazor.start({
            loadBootResource: function (type, name, defaultUri, integrity) {
                if (type === 'manifest') {
                    return fetch(defaultUri, { cache: 'no-cache' });
                }
                return undefined;
            }
        });
    </script>
</body>

</html>
